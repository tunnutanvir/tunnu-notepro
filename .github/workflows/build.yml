name: Build Tunnu NotePro APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Standalone Web Artifacts
        run: npx expo export --platform android

      - name: Upload Tunnu NotePro Deliverable
        uses: actions/upload-artifact@v4
        with:
          name: Tunnu-NotePro-Release-Package
          path: dist/
